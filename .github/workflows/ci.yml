name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  quality:
    name: lint · types · tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.13"]
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (ruff)
        run: |
          ruff check src tests scripts
          ruff format --check src tests scripts

      - name: Types (mypy strict)
        run: mypy

      - name: Tests (coverage gate 80%)
        run: pytest --cov --cov-report=term-missing --cov-fail-under=80

      - name: Public safety scan
        run: python scripts/public_safety_scan.py
